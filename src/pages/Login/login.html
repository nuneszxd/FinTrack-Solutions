<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/styles/login.css">
    <link rel="icon" href="../../assets/images/FinTrack.png">
    <title>Login</title>
</head>
<body>
    <div class="geral-container">

        <div class="login-container">
            <h1 class="login-title">Bem-Vindo</h1>

            <form class="login-form">
                <input class="input-style" type="text" placeholder="Usuário" required>
                <input class="input-style" type="password" placeholder="Senha" required>
                <button class="btn-entrar" type="submit">Entrar</button>
            </form>
        </div>
        <div class="image-container">
            <img src="../../assets/images/login.png" alt="Imagem de Login">
        </div>

    </div>
</body>
</html>
