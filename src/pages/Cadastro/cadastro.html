<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../assets/styles/login.css">
    <link rel="icon" href="../../assets/images/FinTrack.png">
    <title>Cadastro</title>
</head>
<body>
    <div class="geral-container">

        <div class="image-container">
            <img src="../../assets/images/cadastro.svg" alt="Imagem de Cadastro">
        </div>
        <div class="login-container">
            <h1 class="login-title">Criar Conta</h1>

            <form class="login-form">
                <input class="input-style" type="email" placeholder="E-mail" required>
                <input class="input-style" type="password" placeholder="Senha" required>
                <input class="input-style" type="password" placeholder="Confirmar senha" required>
                <button class="btn-entrar" type="submit">Cadastrar</button>
                <a class="form-link" href="../Login/login.html">Já tem conta? Entrar</a>
            </form>
        </div>

    </div>
</body>
</html>
